backend:
  name: git-gateway
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "projects"
    label: "Projects"
    folder: "content/projects"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Location", name: "location", widget: "string" }
      - { label: "Category", name: "category", widget: "select", options: ["Porcelain Patio", "Composite Decking", "Glass Balustrade", "Full Landscaping"] }
      - { label: "Date", name: "date", widget: "string" }
      - { label: "Size", name: "size", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Features", name: "features", widget: "list" }
      - { label: "Main Image", name: "image1", widget: "image" }
      - { label: "Secondary Image", name: "image2", widget: "image" }
      - label: "Testimonial"
        name: "testimonial"
        widget: "object"
        fields:
          - { label: "Quote", name: "quote", widget: "text" }
          - { label: "Author", name: "author", widget: "string" }
          - { label: "Author Location", name: "authorLocation", widget: "string" }

  - name: "testimonials"
    label: "Testimonials"
    folder: "content/testimonials"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Location", name: "location", widget: "string" }
      - { label: "Service", name: "service", widget: "string" }
      - { label: "Rating", name: "rating", widget: "number", value_type: "int", min: 1, max: 5 }
      - { label: "Quote", name: "quote", widget: "text" }
      - { label: "Date", name: "date", widget: "string" }

  - name: "settings"
    label: "Site Settings"
    files:
      - label: "General Settings"
        name: "general"
        file: "content/settings/general.json"
        fields:
          - { label: "Phone Number", name: "phone", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Business Hours", name: "hours", widget: "text" }
